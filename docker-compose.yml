x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  nanobot-webui:
    container_name: nanobot-webui
    <<: *common-config
    profiles:
      - webui
    command: ["webui", "--host", "0.0.0.0", "--port", "18791"]
    restart: unless-stopped
    environment:
      # Optional: set in shell before `docker compose up` to enable Web UI auth.
      NANOBOT_WEBUI_TOKEN: ${NANOBOT_WEBUI_TOKEN:-}
    ports:
      - 18791:18791
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
